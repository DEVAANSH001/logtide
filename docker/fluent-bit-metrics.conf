[SERVICE]
    # Fluent Bit - LogTide System Metrics (OTLP)
    # Usage: docker compose --profile metrics up -d
    # Combine: docker compose --profile logging --profile metrics up -d
    Flush        30
    Daemon       Off
    Log_Level    info

# =============================================================================
# INPUT - CPU Metrics (every 30 seconds)
# =============================================================================
[INPUT]
    Name         cpu
    Tag          metrics.cpu
    Interval_Sec 30

# =============================================================================
# INPUT - Memory Metrics (every 30 seconds)
# =============================================================================
[INPUT]
    Name         mem
    Tag          metrics.mem
    Interval_Sec 30

# =============================================================================
# INPUT - Disk I/O Metrics (every 60 seconds)
# =============================================================================
[INPUT]
    Name         disk
    Tag          metrics.disk
    Interval_Sec 60

# =============================================================================
# INPUT - Network Metrics trigger (every 30 seconds)
# =============================================================================
# Uses dummy input as a trigger; actual network stats are read from
# /host/proc/net/dev by the Lua script (netif plugin can't see host
# interfaces from inside a container)
[INPUT]
    Name         dummy
    Tag          metrics.net
    Interval_Sec 30
    Dummy        {"trigger":"net"}

# =============================================================================
# FILTER - Format metrics as OTLP gauge data points
# =============================================================================
[FILTER]
    Name         lua
    Match        metrics.*
    script       /fluent-bit/etc/format_metrics.lua
    call         format_metrics

# =============================================================================
# OUTPUT - Send to LogTide OTLP Metrics endpoint
# =============================================================================
[OUTPUT]
    Name         http
    Match        metrics.*
    Host         ${LOGTIDE_API_HOST}
    Port         8080
    URI          /v1/otlp/metrics
    Format       json_lines
    Header       X-API-Key ${LOGTIDE_API_KEY}
    Header       Content-Type application/json
    body_key     otlp_payload
    Retry_Limit  3
    tls          Off
