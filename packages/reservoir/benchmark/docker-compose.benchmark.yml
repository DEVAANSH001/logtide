services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: bench-timescaledb
    environment:
      POSTGRES_DB: bench
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bench-network

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: bench-clickhouse
    environment:
      CLICKHOUSE_DB: bench
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: bench
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "default", "--password", "bench", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bench-network

  mongodb:
    image: mongo:7
    container_name: bench-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: bench
      MONGO_INITDB_ROOT_PASSWORD: bench
      MONGO_INITDB_DATABASE: bench
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bench-network

volumes:
  timescale_data:
  clickhouse_data:
  mongo_data:

networks:
  bench-network:
    driver: bridge
